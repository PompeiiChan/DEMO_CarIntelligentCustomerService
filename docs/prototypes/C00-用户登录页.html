<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>location.replace('C01-客户端对话页.html');</script>
  <title>汽车智能客服 - 用户登录页（移动端H5）</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       #0066CC;
      --brand-deep:  #004D99;
      --brand-light: #EBF3FF;
      --success:     #30D158;
      --danger:      #FF453A;

      --bg:          #F2F2F7;
      --surface:     #FFFFFF;
      --fill:        rgba(120,120,128,0.12);

      --text-1:      #1C1C1E;
      --text-2:      #636366;
      --text-3:      #8E8E93;
      --sep:         rgba(60,60,67,0.14);

      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
    }

    body {
      font-family: var(--font);
      background: linear-gradient(160deg, #D4E2EF 0%, #E2EBF5 45%, #EBF0F8 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px 60px;
      color: var(--text-1);
    }

    /* ─── Page label ─── */
    .page-meta {
      text-align: center;
      margin-bottom: 28px;
    }
    .page-meta h1 {
      font-size: 13px;
      font-weight: 600;
      color: rgba(0,0,0,0.45);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .page-meta p {
      font-size: 12px;
      color: rgba(0,0,0,0.3);
      margin-top: 3px;
    }

    /* ─── Phone shell ─── */
    .phone {
      width: 393px;
      background: #111;
      border-radius: 54px;
      padding: 14px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.1),
        inset 0 0 0 1px rgba(255,255,255,0.05),
        0 40px 100px rgba(0,0,0,0.32),
        0 16px 32px rgba(0,0,0,0.18);
      position: relative;
    }
    .phone::before {
      content: '';
      position: absolute;
      left: -3px; top: 120px;
      width: 3px; height: 36px;
      background: #2a2a2a;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 50px 0 #2a2a2a, 0 96px 0 #2a2a2a;
    }
    .phone::after {
      content: '';
      position: absolute;
      right: -3px; top: 148px;
      width: 3px; height: 68px;
      background: #2a2a2a;
      border-radius: 0 2px 2px 0;
    }

    .dynamic-island {
      position: absolute;
      top: 26px; left: 50%;
      transform: translateX(-50%);
      width: 122px; height: 35px;
      background: #000;
      border-radius: 20px;
      z-index: 200;
    }

    /* Screen */
    .screen {
      border-radius: 42px;
      overflow: hidden;
      height: 852px;
      display: flex;
      flex-direction: column;
      position: relative;
      background: #0055BB;
    }

    /* ─── Status bar (translucent over gradient) ─── */
    .status-bar {
      height: 56px;
      padding: 18px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .status-time {
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.92);
      letter-spacing: -0.2px;
    }
    .status-icons {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    /* ─── Hero area (gradient top) ─── */
    .hero {
      flex-shrink: 0;
      height: 288px;
      background: linear-gradient(160deg, #003A80 0%, #0055BB 45%, #1976D2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 36px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle circle decoration */
    .hero::before {
      content: '';
      position: absolute;
      top: -80px; right: -60px;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 20px; left: -100px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }

    .hero-logo {
      width: 64px; height: 64px;
      border-radius: 20px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    .hero-name {
      font-size: 22px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.3px;
      position: relative;
      z-index: 1;
      margin-bottom: 6px;
    }
    .hero-tag {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      position: relative;
      z-index: 1;
      letter-spacing: 0.01em;
    }

    /* ─── Form card (white sheet) ─── */
    .form-card {
      flex: 1;
      background: var(--surface);
      border-radius: 28px 28px 0 0;
      padding: 10px 24px 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 5;
      margin-top: -24px;
    }

    /* Sheet handle */
    .sheet-handle {
      width: 36px; height: 5px;
      background: var(--sep);
      border-radius: 3px;
      margin: 0 auto 18px;
      flex-shrink: 0;
    }

    /* Login/Register tabs */
    .form-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 22px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--sep);
    }
    .form-tab {
      flex: 1;
      padding: 0 0 12px;
      border: none;
      background: transparent;
      font-size: 16px;
      font-weight: 500;
      color: var(--text-3);
      cursor: pointer;
      font-family: var(--font);
      text-align: center;
      position: relative;
      transition: color 0.15s;
    }
    .form-tab.active {
      color: var(--text-1);
      font-weight: 600;
    }
    .form-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 50%;
      transform: translateX(-50%);
      width: 28px; height: 2.5px;
      background: var(--brand);
      border-radius: 2px;
    }

    /* Mode switch (验证码 / 密码) */
    .mode-switch {
      display: flex;
      gap: 0;
      background: var(--fill);
      border-radius: 10px;
      padding: 2px;
      margin-bottom: 20px;
      flex-shrink: 0;
    }
    .mode-btn {
      flex: 1;
      padding: 7px 0;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s;
    }
    .mode-btn.active {
      background: var(--surface);
      color: var(--text-1);
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
    }

    /* Form scroll area */
    .form-scroll {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 20px;
    }
    .form-scroll::-webkit-scrollbar { display: none; }

    /* Input group */
    .input-group {
      margin-bottom: 14px;
    }
    .input-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      margin-bottom: 6px;
      display: block;
    }

    /* Input row (contains input + optional button) */
    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Input field */
    .inp {
      flex: 1;
      height: 50px;
      background: var(--fill);
      border: 1.5px solid transparent;
      border-radius: 13px;
      padding: 0 16px;
      font-size: 15px;
      font-family: var(--font);
      color: var(--text-1);
      outline: none;
      transition: border-color 0.18s, background 0.18s;
    }
    .inp::placeholder { color: var(--text-3); }
    .inp:focus {
      background: var(--surface);
      border-color: var(--brand);
    }

    /* Phone prefix */
    .phone-prefix {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 50px;
      padding: 0 12px;
      background: var(--fill);
      border: 1.5px solid transparent;
      border-radius: 13px;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-1);
      flex-shrink: 0;
      cursor: pointer;
    }

    /* Verification code input — 6 boxes */
    .code-boxes {
      display: flex;
      gap: 8px;
      height: 52px;
    }
    .code-box {
      flex: 1;
      height: 52px;
      background: var(--fill);
      border: 1.5px solid transparent;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-1);
      transition: border-color 0.18s;
    }
    .code-box.filled { border-color: var(--brand); background: var(--brand-light); }
    .code-box.active { border-color: var(--brand); background: var(--surface); }
    .code-box.cursor::after {
      content: '|';
      color: var(--brand);
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Get code button */
    .get-code-btn {
      height: 50px;
      padding: 0 14px;
      background: var(--brand-light);
      border: none;
      border-radius: 13px;
      font-size: 13px;
      font-weight: 600;
      color: var(--brand);
      cursor: pointer;
      font-family: var(--font);
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.12s;
    }
    .get-code-btn:active { background: rgba(0,102,204,0.16); }
    .get-code-btn.sent {
      background: var(--fill);
      color: var(--text-3);
    }

    /* Primary button */
    .primary-btn {
      width: 100%;
      height: 52px;
      background: var(--brand);
      border: none;
      border-radius: 15px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      font-family: var(--font);
      margin-top: 8px;
      box-shadow: 0 4px 16px rgba(0,102,204,0.30);
      transition: background 0.12s, transform 0.1s;
    }
    .primary-btn:active { background: var(--brand-deep); transform: scale(0.98); }

    /* Divider */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0;
      font-size: 12px;
      color: var(--text-3);
    }
    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--sep);
    }

    /* Third party options */
    .third-party {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .tp-btn {
      width: 52px; height: 52px;
      border: 1.5px solid var(--sep);
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.12s;
    }
    .tp-btn:hover { background: var(--fill); }

    /* Switch to register */
    .switch-row {
      text-align: center;
      font-size: 13.5px;
      color: var(--text-2);
      margin-top: 4px;
      flex-shrink: 0;
      padding-bottom: 16px;
    }
    .switch-link {
      color: var(--brand);
      font-weight: 500;
      cursor: pointer;
    }

    /* Terms */
    .terms {
      text-align: center;
      font-size: 11.5px;
      color: var(--text-3);
      line-height: 1.6;
      margin-top: 12px;
    }
    .terms a { color: var(--text-2); text-decoration: underline; text-underline-offset: 2px; }

    /* Home bar */
    .home-bar {
      height: 30px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .home-line {
      width: 134px; height: 5px;
      background: var(--text-1);
      border-radius: 3px;
      opacity: 0.14;
    }

    /* ─── Second phone: Register state ─── */
    .phones-row {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }
    .phone-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .phone-col-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(0,0,0,0.35);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="page-meta">
  <h1>C00 · 用户登录页</h1>
  <p>移动端 H5 · 390 × 852 · 左：手机号验证码登录 · 右：新用户注册</p>
</div>

<div class="phones-row">

  <!-- ── Phone 1: Login ── -->
  <div class="phone-col">
    <div class="phone">
      <div class="dynamic-island"></div>
      <div class="screen">

        <!-- Status bar -->
        <div class="status-bar">
          <span class="status-time">9:41</span>
          <div class="status-icons">
            <svg width="18" height="13" viewBox="0 0 18 13" fill="none">
              <rect x="0"    y="8"   width="3.5" height="5"   rx="1" fill="rgba(255,255,255,0.9)"/>

          <div class="form-scroll">

            <div class="input-group">
              <label class="input-label">手机号</label>

  <!-- ── Phone 2: Register ── -->
  <div class="phone-col">
    <div class="phone">
      <div class="dynamic-island"></div>
      <div class="screen">

        <!-- Status bar -->

          <span class="status-time">9:43</span>
          <div class="status-icons">
            <svg width="18" height="13" viewBox="0 0 18 13" fill="none">

              <circle cx="8.5" cy="11.5" r="1.5" fill="rgba(255,255,255,0.9)"/>
              <path d="M5.2 8.8A4.7 4.7 0 0 1 8.5 7.5a4.7 4.7 0 0 1 3.3 1.3" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>

              <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="rgba(255,255,255,0.5)"/>
              <rect x="2" y="2" width="17" height="9" rx="2.5" fill="rgba(255,255,255,0.9)"/>
              <path d="M24 4.5V8.5C24.8 8.2 25.5 7.4 25.5 6.5S24.8 4.8 24 4.5Z" fill="rgba(255,255,255,0.5)"/>
            </svg>
          </div>
        </div>

        <!-- Hero (shorter, back button) -->
        <div class="hero" style="height:200px;padding-bottom:28px">
          <div class="hero-logo" style="width:52px;height:52px;border-radius:16px;margin-bottom:10px">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <path d="M5 7 H23 L5 21 H23"
                    stroke="white" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="hero-name" style="font-size:18px">创建账号</div>
          <div class="hero-tag">注册后即可使用全部车主服务</div>
        </div>

        <!-- Register form card -->
        <div class="form-card" style="margin-top:-24px">
          <div class="sheet-handle"></div>

          <div class="form-tabs">
            <button class="form-tab">登录</button>
            <button class="form-tab active">注册</button>
          </div>

          <div class="form-scroll">

            <!-- Nickname -->
            <div class="input-group">
              <label class="input-label">昵称</label>
              <input class="inp" type="text" placeholder="请输入您的昵称" value="李先生">
            </div>

            <!-- Phone -->
            <div class="input-group">
              <label class="input-label">手机号</label>
              <div class="input-row">
                <div class="phone-prefix">
                  🇨🇳 +86
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="margin-left:2px">
                    <path d="M2.5 3.5L5 6.5L7.5 3.5" stroke="#8E8E93" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <input class="inp" type="tel" placeholder="请输入手机号" value="138 5566 7788">
              </div>
            </div>

            <!-- Code -->
            <div class="input-group">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                <label class="input-label" style="margin:0">验证码</label>
                <button class="get-code-btn sent">重新发送 54s</button>
              </div>
              <div class="code-boxes">
                <div class="code-box filled">8</div>
                <div class="code-box filled">8</div>
                <div class="code-box filled">6</div>
                <div class="code-box filled">4</div>
                <div class="code-box active cursor"></div>
                <div class="code-box"></div>
              </div>
            </div>

            <!-- Hint -->
            <div style="display:flex;align-items:center;gap:6px;margin:4px 0 16px;font-size:12px;color:var(--text-3)">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <circle cx="7" cy="7" r="6" stroke="#8E8E93" stroke-width="1.3"/>
                <path d="M7 6V10M7 4.5V5" stroke="#8E8E93" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              注册成功后将自动登录
            </div>

            <!-- Register button -->
            <button class="primary-btn">注册并登录</button>

            <!-- Terms -->
            <div class="terms" style="margin-top:14px">
              注册即表示您同意 <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a>
            </div>

          </div>

          <div class="switch-row">
            已有账号？<span class="switch-link">直接登录 →</span>
          </div>
        </div>

        <div class="home-bar"><div class="home-line"></div></div>
      </div>
    </div>
    <span class="phone-col-label">新用户注册</span>
  </div>

</div><!-- /phones-row -->

</body>
</html>
